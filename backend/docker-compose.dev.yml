services:
  backend:
    image: containermaster-backend:dev
    pull_policy: never
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 3000 --reload
    environment:
      - NODE_ENV=development
    read_only: false
    tmpfs: []
    volumes:
      - ./app:/app/app
      - /var/run/docker.sock:/var/run/docker.sock
