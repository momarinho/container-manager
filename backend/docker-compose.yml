services:
  backend:
    image: ${IMAGE_NAME:-ghcr.io/containermaster/backend}:${IMAGE_TAG:-latest}
    build: .
    container_name: containermaster-backend
    pull_policy: if_not_present
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-3000}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-24h}
      - API_TOKENS=${API_TOKENS:-}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DOCKER_SOCKET_PATH=${DOCKER_SOCKET_PATH:-/var/run/docker.sock}
      - STATS_UPDATE_INTERVAL=${STATS_UPDATE_INTERVAL:-5000}
      - STATS_HISTORY_SIZE=${STATS_HISTORY_SIZE:-100}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-60000}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS:-100}
      - TERMINAL_IDLE_TIMEOUT=${TERMINAL_IDLE_TIMEOUT:-600000}
      - TERMINAL_MAX_SESSIONS=${TERMINAL_MAX_SESSIONS:-10}
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
