name: Frontend CI/CD

on:
  pull_request:
    paths:
      - "frontend/**"
      - "shared/**"
      - "docker-compose.release.yml"
      - ".env.release.example"
      - "scripts/deploy-release.sh"
      - "scripts/wait-for-url.sh"
      - ".github/workflows/frontend-ci-cd.yml"
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "shared/**"
      - "docker-compose.release.yml"
      - ".env.release.example"
      - "scripts/deploy-release.sh"
      - "scripts/wait-for-url.sh"
      - ".github/workflows/frontend-ci-cd.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: frontend-deploy-production
  cancel-in-progress: true

jobs:
  verify:
    name: Verify frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run verify
        env:
          EXPO_PUBLIC_DEFAULT_API_URL: ${{ vars.FRONTEND_DEFAULT_API_URL || 'http://localhost:3000' }}
          EXPO_PUBLIC_RELEASE_CHANNEL: ${{ github.ref == 'refs/heads/main' && 'stable' || 'preview' }}
          EXPO_PUBLIC_COMMIT_SHA: ${{ github.sha }}
        run: npm run verify

  docker-build:
    name: Build frontend image
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile.web
          push: false
          build-args: |
            EXPO_PUBLIC_DEFAULT_API_URL=${{ vars.FRONTEND_DEFAULT_API_URL || 'http://localhost:3000' }}
            EXPO_PUBLIC_RELEASE_CHANNEL=${{ github.ref == 'refs/heads/main' && 'stable' || 'preview' }}
            EXPO_PUBLIC_COMMIT_SHA=${{ github.sha }}

  build-and-push:
    name: Publish frontend image
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/containermaster-frontend-web
          tags: |
            type=sha
            type=raw,value=latest

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile.web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            EXPO_PUBLIC_DEFAULT_API_URL=${{ vars.FRONTEND_DEFAULT_API_URL || 'http://localhost:3000' }}
            EXPO_PUBLIC_RELEASE_CHANNEL=stable
            EXPO_PUBLIC_COMMIT_SHA=${{ github.sha }}

  deploy:
    name: Deploy full stack after frontend release
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.DEPLOY_HOST != '' && secrets.DEPLOY_USER != '' && secrets.DEPLOY_SSH_KEY != ''
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            if [ -z "${DEPLOY_PATH}" ]; then
              DEPLOY_PATH="$HOME/container-manager"
            fi
            REPO_URL="https://github.com/${{ github.repository }}.git"
            BRANCH="${{ secrets.DEPLOY_BRANCH }}"
            if [ -z "${BRANCH}" ]; then
              BRANCH="main"
            fi

            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              git clone --depth 1 --branch "$BRANCH" "$REPO_URL" "$DEPLOY_PATH"
            fi

            cd "$DEPLOY_PATH"
            git fetch --all --prune
            git checkout "$BRANCH"
            git pull --ff-only origin "$BRANCH"

            export FRONTEND_IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/containermaster-frontend-web"
            export FRONTEND_IMAGE_TAG="${{ github.sha }}"
            ./scripts/deploy-release.sh
